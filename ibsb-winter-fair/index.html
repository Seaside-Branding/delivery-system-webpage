            --bg: #fffaf0;

            --title-font: 'Playfair Display', sans-serif;

        body { background: var(--bg); color: var(--text); font-family: var(--body-font); overflow-x: hidden; text-align: center; margin: 0; }

        @media (min-width: 768px) { .masonry { columns: 3; padding: 4rem; } }
        .item { break-inside: avoid; margin-bottom: var(--item-gap); border-radius: 8px; overflow: hidden; background: #111; }
        .item img { width: 100%; height: auto; display: block; transition: transform 0.5s ease; }
        .item:hover img { transform: scale(1.05); }
        .btn-primary { 
            background: var(--accent); 
            color: var(--bg); 
            text-decoration: none !important; 
            font-weight: 900; 
            border-radius: 12px; 
            display: inline-block; 
            transition: all 0.3s ease; 
            cursor: pointer; 
            border: none; 
            font-family: var(--button-font);
            letter-spacing: 0.1em;
            line-height: 1;
            font-size: calc(11px * 1);
        }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-2px); }
        .title-heading { 
            font-family: var(--title-font) !important; 
            font-size: calc(clamp(4rem, 15vw, 11rem) * 1) !important; 
            font-weight: 300 !important; 
            letter-spacing: 0em !important; 
            line-height: 1.1 !important; 
            margin: 0 0 2rem 0 !important; 
            text-align: center !important;
        }
        .details { 
            font-family: var(--body-font) !important; 
            font-size: calc(clamp(10px, 2vw, 13px) * 1) !important; 
            font-weight: 800 !important; 
            text-transform: uppercase !important; 
            letter-spacing: 0.1em !important; 
            line-height: 1.6 !important; 
            color: var(--subtitle) !important;
            text-align: center !important;
        }
        .details a { text-decoration: underline; color: inherit; }
        header { padding: 10rem 2rem 6rem 2rem; max-width: 1400px; margin: 0 auto; text-align: center; }
        footer { padding: 8rem 2rem; }
        .pswp__button--download { background: none !important; display: flex !important; align-items: center !important; justify-content: center !important; }
        footer a { text-decoration: none; color: inherit; }
        footer a:hover { text-decoration: underline; }

    <script type="module">
        import PhotoSwipeLightbox from 'https://cdnjs.cloudflare.com/ajax/libs/photoswipe/5.4.2/photoswipe-lightbox.esm.min.js';
        const lightbox = new PhotoSwipeLightbox({
            gallery: '#gallery',
            children: 'a',
            pswpModule: () => import('https://cdnjs.cloudflare.com/ajax/libs/photoswipe/5.4.2/photoswipe.esm.min.js')
        });
        
        lightbox.on('uiRegister', function() {
            lightbox.pswp.ui.registerElement({
                name: 'download-button',
                order: 8,
                isPrimary: true,
                tagName: 'a',
                html: '<svg aria-hidden="true" class="pswp__icn" viewBox="0 0 32 32" width="32" height="32"><path d="M20.5 14.3 17.1 18V10h-2.2v7.9l-3.4-3.6L10 15.8l6 6.2 6-6.2Z" fill="currentColor"/><path d="M24 24H8v-2h16Z" fill="currentColor"/></svg>',
                onInit: (el, pswp) => {
                    el.setAttribute('download', '');
                    el.setAttribute('target', '_blank');
                    pswp.on('change', () => {
                        el.href = pswp.currSlide.data.src;
                    });
                }
            });
        });

        lightbox.init();
    </script>
