        .masonry { column-gap: var(--item-gap); columns: 1; padding: 1.5rem; max-width: 1600px; margin: 0 auto; }

        .item { break-inside: avoid; margin-bottom: var(--item-gap); border-radius: 8px; overflow: hidden; background: #111; }
        .item img { width: 100%; height: auto; display: block; transition: transform 0.5s ease; }
        .item:hover img { transform: scale(1.05); }
        .btn-primary { 
            background: var(--accent); 
            color: var(--bg); 
            text-decoration: none !important; 
            font-weight: 900; 
            border-radius: 12px; 
            display: inline-block; 
            transition: all 0.3s ease; 
            cursor: pointer; 
            border: none; 
            font-family: var(--button-font);
        }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-2px); }
        .title-heading { 
            font-family: var(--title-font) !important; 
            font-size: clamp(4rem, 15vw, 11rem) !important; 
            font-weight: 300 !important; 
            letter-spacing: -0.05em !important; 
            line-height: 1 !important; 
            margin: 0 0 2rem 0 !important; 
            text-align: center !important;
        }
        .details { 
            font-family: var(--body-font) !important; 
            font-size: 13px !important; 
            font-weight: 800 !important; 
            text-transform: uppercase !important; 
            letter-spacing: 0.2em !important; 
            line-height: 1.5 !important; 
            opacity: 0.5 !important; 
            text-align: center !important;
        }
        .details a { text-decoration: underline; color: inherit; }
        header { padding: 10rem 2rem 6rem 2rem; max-width: 1400px; margin: 0 auto; text-align: center; }
        footer { padding: 8rem 2rem; opacity: 0.3; font-size: 10px; letter-spacing: 0.2em; font-weight: 900; text-transform: uppercase; }
        .pswp__button--download { background: none !important; display: flex !important; align-items: center !important; justify-content: center !important; }

                    el.setAttribute('target', '_blank');

            });
        });
